name: pr-gate-bootstrap

on:
  pull_request_target:
    types: [opened, synchronize, reopened, edited, ready_for_review, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: read

jobs:
  bootstrap-guard:
    name: bootstrap-guard
    runs-on: ubuntu-latest

    steps:
      - name: Detect workflow tampering from PR metadata only
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;

            const WORKFLOW_APPROVAL_LABEL = 'workflow-approved';
            const PROTECTED_WORKFLOWS = new Set([
              '.github/workflows/pr-gate.yml',
              '.github/workflows/pr-gate-bootstrap.yml'
            ]);
            const TRUSTED_ASSOCIATIONS = new Set([
              'OWNER',
              'MEMBER',
              'COLLABORATOR'
            ]);

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner,
                repo,
                pull_number,
                per_page: 100
              }
            );

            const pr = await github.rest.pulls.get({
              owner,
              repo,
              pull_number
            });

            const reviews = await github.paginate(
              github.rest.pulls.listReviews,
              {
                owner,
                repo,
                pull_number,
                per_page: 100
              }
            );

            const touchedWorkflows = files.filter(f =>
              f.filename.startsWith('.github/workflows/')
            );

            const protectedTouches = touchedWorkflows.filter(f =>
              PROTECTED_WORKFLOWS.has(f.filename)
            );

            const protectedDeletions = protectedTouches.filter(f =>
              f.status === 'removed'
            );

            const protectedMutations = protectedTouches.filter(f =>
              ['added', 'modified', 'renamed', 'removed'].includes(f.status)
            );

            const labels = (pr.data.labels || []).map(l => l.name);
            const hasWorkflowApprovalLabel = labels.includes(WORKFLOW_APPROVAL_LABEL);

            const latestReviewByUser = new Map();
            for (const r of reviews) {
              if (!r.user?.login) continue;
              latestReviewByUser.set(r.user.login, r);
            }

            const trustedApprovals = [...latestReviewByUser.values()].filter(r =>
              r.state === 'APPROVED' &&
              TRUSTED_ASSOCIATIONS.has(r.author_association)
            );

            const summaryLines = [];
            summaryLines.push(`PR #${pull_number}`);
            summaryLines.push(`workflow files touched: ${touchedWorkflows.length}`);
            summaryLines.push(`approval label present: ${hasWorkflowApprovalLabel}`);
            summaryLines.push(`trusted approvals: ${trustedApprovals.length}`);
            summaryLines.push('');
            if (touchedWorkflows.length > 0) {
              summaryLines.push('Touched workflow files:');
              for (const f of touchedWorkflows) {
                summaryLines.push(`- ${f.filename} [${f.status}]`);
              }
              summaryLines.push('');
            }
            if (trustedApprovals.length > 0) {
              summaryLines.push('Trusted approvals:');
              for (const r of trustedApprovals) {
                summaryLines.push(`- ${r.user.login} (${r.author_association})`);
              }
            }

            await core.summary
              .addHeading('Bootstrap Guard Result')
              .addCodeBlock(summaryLines.join('\n'), 'text')
              .write();

            if (protectedDeletions.length > 0) {
              core.setFailed(
                [
                  'bootstrap-guard: protected workflow deletion detected',
                  ...protectedDeletions.map(f => `- ${f.filename} [${f.status}]`)
                ].join('\n')
              );
              return;
            }

            if (touchedWorkflows.length === 0) {
              core.info('bootstrap-guard: no workflow tampering detected');
              return;
            }

            if (!hasWorkflowApprovalLabel) {
              core.setFailed(
                [
                  'bootstrap-guard: workflow change detected without approval label',
                  `required label: ${WORKFLOW_APPROVAL_LABEL}`,
                  ...touchedWorkflows.map(f => `- ${f.filename} [${f.status}]`)
                ].join('\n')
              );
              return;
            }

            if (trustedApprovals.length < 1) {
              core.setFailed(
                [
                  'bootstrap-guard: workflow change detected without trusted approval',
                  'require at least 1 APPROVED review from OWNER/MEMBER/COLLABORATOR',
                  ...touchedWorkflows.map(f => `- ${f.filename} [${f.status}]`)
                ].join('\n')
              );
              return;
            }

            if (protectedMutations.length > 0) {
              core.notice(
                [
                  'bootstrap-guard: protected workflow mutation allowed by strict approval',
                  ...protectedMutations.map(f => `- ${f.filename} [${f.status}]`)
                ].join('\n')
              );
            } else {
              core.notice('bootstrap-guard: workflow change allowed by strict approval');
            }
