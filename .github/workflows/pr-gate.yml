name: pr-gate

on:
  pull_request:

jobs:
  pr-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch base branch
        run: |
          git fetch origin ${{ github.base_ref }}

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip pytest

      - name: Run PR gate tests
        id: pr_gate_tests
        continue-on-error: true
        run: |
          pytest -q tests/test_pr_gate_deletion_guard.py

      - name: Run PR gate
        run: |
          TESTS_STATUS="pass"
          if [ "${{ steps.pr_gate_tests.outcome }}" != "success" ]; then
            TESTS_STATUS="fail"
          fi

          python tools/pr_gate.py \
            --repo "${{ github.repository }}" \
            --branch "${{ github.head_ref }}" \
            --base "${{ github.event.pull_request.base.ref }}" \
            --strict \
            --syntax unknown \
            --tests "$TESTS_STATUS" \
            --freshness unknown \
            --change-context "${{ github.event.pull_request.title }} ${{ github.event.pull_request.body }}"
