name: pr-gate

on:
  pull_request:
    branches: [main]

jobs:
  pr-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run PR gate tests
        run: |
          python -m pip install --upgrade pip pytest
          pytest -q tests/test_pr_gate_deletion_guard.py tests/test_pr_gate_strict_exit.py

      - name: Run PR gate in strict mode
        run: |
          python tools/pr_gate.py --base main --strict
